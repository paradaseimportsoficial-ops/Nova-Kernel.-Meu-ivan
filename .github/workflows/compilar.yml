name: Compilar RIO NovaKernel M52
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o Codigo-Fonte
        uses: actions/checkout@v4

      - name: Instalar Ferramentas Oficiais
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git libssl-dev libcrypto++-dev libelf-dev ccache lz4 liblz4-tool

      - name: Baixar Compilador Clang do Google
        run: |
          mkdir -y android-clang
          cd android-clang
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522940.tar.gz
          tar -xf clang-r522940.tar.gz

      - name: Compilar Imagem do Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$(pwd)/android-clang/bin:$PATH
          make clean
          make mrproper
          make qcom_rio_defconfig
          make -j$(nproc) CC=clang CROSS_COMPILE=aarch64-linux-gnu-

      - name: Salvar Arquivo Boot final
        uses: actions/upload-artifact@v4
        with:
          name: RIO_Kernel_M52
          path: arch/arm64/boot/Image
