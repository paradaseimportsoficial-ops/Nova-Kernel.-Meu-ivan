name: Compilar RIO NovaKernel M52
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Baixar o Codigo-Fonte
        uses: actions/checkout@v4

      - name: Instalar Ferramentas Essenciais
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc libelf-dev libssl-dev

      - name: Compilar Imagem do Kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make clean
          make mrproper
          make defconfig
          make -j$(nproc)

      - name: Salvar Arquivo Boot final
        uses: actions/upload-artifact@v4
        with:
          name: RIO_Kernel_M52
          path: arch/arm64/boot/Image
