      - name: Compilar Imagem do Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make mrproper
          make defconfig
          # Adicionamos V=1 para mostrar o comando exato que falha
          make -j2 V=1 KCFLAGS="-Wno-error -fpermissive -w"
